name: Dependency Check (Trivy)

on:
  push:
    branches: [main-4.x, ng]
    paths:
      - 'build.gradle'
      - 'libs.versions.toml'
      - 'core/build.gradle'
      - '.github/workflows/dependency-check.yml'
  pull_request:
    branches: [main-4.x, ng]
  schedule:
    # Weekly scan on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

jobs:
  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: 17
          cache: gradle

      - name: Build lib/ directory
        run: ./gradlew packageLibs

      - name: Run Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: build/lib
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Run Trivy (SARIF for GitHub Security)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: build/lib
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
